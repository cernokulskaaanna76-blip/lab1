<!doctype html>
<html lang="uk">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ЛР1 – Сервіс чергувань (Варіант 11)</title>

    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>

<body>

    <div class="container">

        <header>
            <h1>Сервіс чергувань у лабораторії (Варіант 11)</h1>
        </header>

        <section>
            <h2>Додати зміну</h2>

            <form id="shiftForm">

                <div class="field">
                    <label for="dateInput">Дата</label>
                    <input type="date" id="dateInput" />
                    <p class="error-text" id="dateError"></p>
                </div>

                <div class="field">
                    <label for="timeSlotSelect">Часовий проміжок</label>
                    <select id="timeSlotSelect">
                        <option value="">Оберіть</option>
                        <option value="Morning">Ранок (08:00–12:00)</option>
                        <option value="Day">День (12:00–16:00)</option>
                        <option value="Evening">Вечір (16:00–20:00)</option>
                    </select>
                    <p class="error-text" id="timeSlotError"></p>
                </div>

                <div class="field">
                    <label for="userInput">Ім'я користувача</label>
                    <input type="text" id="userInput" />
                    <p class="error-text" id="userError"></p>
                </div>

                <div class="field">
                    <label for="commentInput">Коментар</label>
                    <textarea id="commentInput" rows="3"></textarea>
                    <p class="error-text" id="commentError"></p>
                </div>

                <div class="field">
                    <label for="statusSelect">Статус</label>
                    <select id="statusSelect">
                        <option value="">Оберіть</option>
                        <option value="Planned">Заплановано</option>
                        <option value="Confirmed">Підтверджено</option>
                        <option value="Cancelled">Скасовано</option>
                    </select>
                    <p class="error-text" id="statusError"></p>
                </div>

                <div class="buttons">
                    <button type="submit">Додати</button>
                    <button type="button" id="resetBtn">Очистити</button>
                </div>
                <p id="successMessage"></p>

            </form>
        </section>

        <section>

            <h2>Список змін</h2>

            <div class="filter">
                <label for="filterStatus">Фільтр по статусу:</label>
                <select id="filterStatus">
                    <option value="">Усі статуси</option>
                    <option value="Planned">Заплановано</option>
                    <option value="Confirmed">Підтверджено</option>
                    <option value="Cancelled">Скасовано</option>
                </select>
            </div>

            <button id="sortDate">Сортувати по даті</button>

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Дата</th>
                        <th>Час</th>
                        <th>Користувач</th>
                        <th>Статус</th>
                        <th>Коментар</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

        </section>

    </div>
</body>

</html>
